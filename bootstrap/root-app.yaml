apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # Root no longer reconciles infrastructure manifests directly.
  # It only creates child Application resources, which then each
  # reconcile their own subdirectories under infrastructure/.
  source:
    repoURL: https://github.com/shiverwaves/casa-watch.git
    targetRevision: HEAD
    path: bootstrap/applications
    directory:
      recurse: false

  destination:
    server: https://kubernetes.default.svc
    # Child Application CRs land in the argocd namespace.
    namespace: argocd

  syncPolicy:
    automated:
      # NOTE: prune intentionally disabled during the app-of-apps migration.
      # The previous root claimed every resource under infrastructure/ via a
      # single Application. When this refactor lands, those resources will
      # transfer to the new child Applications. With prune disabled, the old
      # root cannot delete them mid-handoff. Re-enable prune in a follow-up
      # commit once `argocd app list` shows root + children all Synced/Healthy.
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
