# Loki single-binary mode, backed by Garage S3.
# https://grafana.com/docs/loki/latest/setup/install/helm/install-monolithic/

deploymentMode: SingleBinary

loki:
  # Single-tenant: no X-Scope-OrgID required on push/query requests.
  auth_enabled: false

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks
      ruler:  loki-chunks
      admin:  loki-chunks
    s3:
      endpoint: garage.storage.svc.cluster.local:3900
      region: garage
      accessKeyId: ${AWS_ACCESS_KEY_ID}
      secretAccessKey: ${AWS_SECRET_ACCESS_KEY}
      s3ForcePathStyle: true   # required for non-AWS S3 endpoints
      insecure: true

  # Lab-tier limits — relax retention but cap query volume.
  limits_config:
    retention_period: 168h     # 7 days
    reject_old_samples: true
    reject_old_samples_max_age: 168h

singleBinary:
  replicas: 1
  extraEnvFrom:
    - secretRef:
        name: garage-s3-credentials
  persistence:
    storageClass: local-path
    size: 5Gi

# Disable the multi-pod scale-out modes (we're SingleBinary).
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Skip the optional caches for a lab; they add 3+ pods we don't need.
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Disable the test harness and other non-essentials.
test:
  enabled: false
lokiCanary:
  enabled: false
