apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: listing-events
  namespace: kafka
  labels:
    strimzi.io/cluster: listings
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  partitions: 3
  replicas: 1
  config:
    retention.ms: 604800000   # 7 days
    cleanup.policy: delete
